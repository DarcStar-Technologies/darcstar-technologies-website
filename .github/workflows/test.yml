name: test

# Run the full local test suite in CI (DAR-49): the three vitest projects (client / server /
# storybook — client + storybook drive real chromium via vitest browser mode) and the Playwright
# e2e suite, whose webServer builds the Cloudflare bundle and previews it on the real Workers
# runtime (wrangler dev). No real credentials exist in CI: the unit job runs with no env at all,
# and the e2e job runs against committed placeholder values (below) — the e2e specs are written
# DB-free, and a Sanity-token-less preview degrades to empty content lists, which the specs
# tolerate (the same resilience posture the routes ship with).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # The client + storybook projects run in real chromium (vitest browser mode);
      # --with-deps also installs the runner's system libraries.
      - run: pnpm exec playwright install --with-deps chromium
      # No `--` before --run: pnpm forwards a literal `--` and vitest would discard the flag
      # (the job would then rely on vitest's CI detection alone to avoid watch mode).
      - run: pnpm test:unit --run

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # The preview worker needs env PRESENT to construct its DB/auth clients (getDb() / Better
      # Auth throw when the vars are ABSENT), but the e2e specs are DB-free by design —
      # placeholder values satisfy construction without any real credentials, and the one load
      # that queries (/waitlist interest suggestions) degrades to its curated seed. Turnstile
      # test keys are baked into the preview script itself.
      - name: Provide placeholder runtime env (specs never touch a real DB)
        run: |
          {
            echo 'DATABASE_URL=libsql://placeholder.invalid'
            echo 'DATABASE_AUTH_TOKEN=placeholder'
            echo 'BETTER_AUTH_SECRET=e2e-placeholder-not-a-secret'
            echo 'ORIGIN=http://localhost:4173'
          } > .env
      # Not `pnpm test:e2e` — the runner additionally needs --with-deps for chromium's system
      # libraries, and this skips the script's own (then-redundant) install step.
      - run: pnpm exec playwright install --with-deps chromium
      # Playwright's webServer runs `pnpm build && pnpm preview` (the real wrangler dev runtime,
      # with the always-pass Turnstile test keys baked in — see package.json).
      - run: pnpm exec playwright test
      # A red e2e without artifacts is undebuggable — keep the traces (captured on first retry,
      # see playwright.config.ts) and any screenshots/output from the failing run.
      - name: Upload Playwright results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
