# See https://pre-commit.com for usage.
# Install the git hooks with:  pre-commit install
# (installs both the pre-commit and commit-msg hook types)
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Lint GitHub Actions workflow files (.github/workflows/*.yml)
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Lint the commit message against Conventional Commits
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.26.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/config-conventional'

  # Keep generated Cloudflare env types in sync with their two committed inputs: wrangler.jsonc
  # (bindings) and .env.example (env-var names). The hook regenerates worker-configuration.d.ts
  # and fails if it drifted from what's staged, so neither edit can land with stale types.
  #
  # `pnpm gen` is scripts/gen-types.mjs (DAR-49), which made generation fully DETERMINISTIC:
  # env-var names are read from .env.example (never a dev's real .env), and the volatile bits of
  # wrangler's output (content hash, the post-build `mainModule`/GlobalProps block — issue #67)
  # are normalized away. Any checkout reproduces the committed file byte-for-byte, so the
  # `files` scope is purely a speed optimization now, not a correctness dodge. The `check` CI
  # job carries the enforced twin of this guard.
  - repo: local
    hooks:
      - id: wrangler-types
        name: wrangler types (worker-configuration.d.ts)
        entry: pnpm run gen
        language: system
        pass_filenames: false
        files: ^(wrangler\.jsonc|\.env\.example)$

      # Keep the drizzle/ migration trail in sync with the DB schema. `db:push` (the default apply
      # path) doesn't touch drizzle/, so a schema edit can leave it stale. Scoped to the schema
      # files: on any change there, regenerate migrations — if one was needed, `db:generate` writes
      # a new SQL file + bumps drizzle/meta/_journal.json, which pre-commit sees and fails on, so the
      # migration lands in the same commit. Local fast-feedback twin of the `drizzle` CI gate (which
      # is the enforced one). Reads DATABASE_URL from `.env` like `db:push`, but never connects.
      - id: drizzle-generate
        name: drizzle migrations in sync (drizzle/)
        entry: pnpm run db:generate
        language: system
        pass_filenames: false
        files: ^src/lib/server/db/.*\.ts$
