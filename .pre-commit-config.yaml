# See https://pre-commit.com for usage.
# Install the git hooks with:  pre-commit install
# (installs both the pre-commit and commit-msg hook types)
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Lint GitHub Actions workflow files (.github/workflows/*.yml)
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Lint the commit message against Conventional Commits
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.26.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/config-conventional'

  # Keep the generated Cloudflare env types in sync (runs `wrangler types`).
  # Regenerates worker-configuration.d.ts on every commit; pre-commit fails if
  # it drifted from what's staged, so stale types can't be committed. Guards the
  # `wrangler types --check` gate in `pnpm build`. Wrangler is pinned to an exact
  # version (package.json) so local and CI generate byte-identical output.
  - repo: local
    hooks:
      - id: wrangler-types
        name: wrangler types (worker-configuration.d.ts)
        entry: pnpm run gen
        language: system
        pass_filenames: false
        always_run: true
