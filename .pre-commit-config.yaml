# See https://pre-commit.com for usage.
# Install the git hooks with:  pre-commit install
# (installs both the pre-commit and commit-msg hook types)
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Lint GitHub Actions workflow files (.github/workflows/*.yml)
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Lint the commit message against Conventional Commits
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.26.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/config-conventional'

  # Keep generated Cloudflare env types in sync with wrangler.jsonc bindings.
  # Runs `wrangler types` on every commit and fails if worker-configuration.d.ts
  # drifted from what's staged, so binding changes can't be committed with stale
  # types. Wrangler is pinned to an exact version (package.json) for reproducible
  # output. Note: `pnpm build`/`check` no longer run `wrangler types --check` —
  # that gate is build-state-dependent (the `mainModule` block only exists after
  # `vite build`), so they regenerate types instead of gating on a committed snapshot.
  - repo: local
    hooks:
      - id: wrangler-types
        name: wrangler types (worker-configuration.d.ts)
        entry: pnpm run gen
        language: system
        pass_filenames: false
        always_run: true
