# See https://pre-commit.com for usage.
# Install the git hooks with:  pre-commit install
# (installs both the pre-commit and commit-msg hook types)
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Lint GitHub Actions workflow files (.github/workflows/*.yml)
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Lint the commit message against Conventional Commits
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.26.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/config-conventional'

  # Keep generated Cloudflare env types in sync with wrangler.jsonc bindings.
  # Scoped to commits that touch wrangler.jsonc — bindings only live there, so that's
  # the only edit that can stale the types. The hook regenerates worker-configuration.d.ts
  # and fails if it drifted from what's staged, so a binding change can't land with stale
  # types. Wrangler is pinned to an exact version (package.json) for reproducible output.
  #
  # The committed worker-configuration.d.ts is the build-independent snapshot: generated
  # with no built worker on disk, it carries no `mainModule` block importing the gitignored
  # .svelte-kit/cloudflare/_worker (that block only appears after `vite build`). A fresh
  # `wrangler types` on any clean checkout reproduces it byte-for-byte. That's why this hook
  # is `files`-scoped rather than `always_run`: firing on every commit made it regenerate the
  # build-state-dependent file and abort unrelated commits (issue #67). `pnpm build`/`check`
  # likewise regenerate types rather than gating on the committed snapshot.
  - repo: local
    hooks:
      - id: wrangler-types
        name: wrangler types (worker-configuration.d.ts)
        entry: pnpm run gen
        language: system
        pass_filenames: false
        files: ^wrangler\.jsonc$
