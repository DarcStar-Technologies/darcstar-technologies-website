<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="-3 -1 112 112">


            <defs>
              <style>
                /* Orbit the colour-charge rings and their bright "Kepler" particles.
                   stroke-dasharray sums to ~222 (one ellipse circumference); a full +222
                   dashoffset cycle = one forward lap per 7.37s (the three are phase-offset).
                   Black-hole velocity: the pulse COASTS slowly through apoapsis, then whips
                   through periapsis — closest approach to the sphere, arc-fraction ~0.66
                   (computed from the sphere at 38,56 and the -15deg group + per-ring
                   rotations) — at ~5x the apoapsis speed. Modelled as a single sharp speed
                   peak at periapsis (raised-cosine^2 — fast pickup out of apoapsis, quick
                   fall-off after) eased in the SPACE domain, so peak speed lands EXACTLY at
                   closest approach and the long slow dwell sits on the far side (peak in
                   time ~78%, later than 66% because the pulse loiters at apoapsis). Time
                   stays linear (inline `linear`); this value curve is the easing.
                   Peak/min per-5% step ~30.6 vs ~6.3 (=~4.9x), monotonic — never reverses. */
                @keyframes keplerflow {
                  0%{stroke-dashoffset:0} 5%{stroke-dashoffset:7.2} 10%{stroke-dashoffset:13.9}
                  15%{stroke-dashoffset:20.3} 20%{stroke-dashoffset:26.6} 25%{stroke-dashoffset:33}
                  30%{stroke-dashoffset:39.3} 35%{stroke-dashoffset:45.6} 40%{stroke-dashoffset:51.9}
                  45%{stroke-dashoffset:58.4} 50%{stroke-dashoffset:65.2} 55%{stroke-dashoffset:72.6}
                  60%{stroke-dashoffset:81.3} 65%{stroke-dashoffset:92.7} 70%{stroke-dashoffset:109.2}
                  75%{stroke-dashoffset:134.8} 80%{stroke-dashoffset:165.4} 85%{stroke-dashoffset:188.3}
                  90%{stroke-dashoffset:203.1} 95%{stroke-dashoffset:213.6} 100%{stroke-dashoffset:222}
                }
                @keyframes dashflow {
                  0%{stroke-dashoffset:0} 5%{stroke-dashoffset:7.2} 10%{stroke-dashoffset:13.9}
                  15%{stroke-dashoffset:20.3} 20%{stroke-dashoffset:26.6} 25%{stroke-dashoffset:33}
                  30%{stroke-dashoffset:39.3} 35%{stroke-dashoffset:45.6} 40%{stroke-dashoffset:51.9}
                  45%{stroke-dashoffset:58.4} 50%{stroke-dashoffset:65.2} 55%{stroke-dashoffset:72.6}
                  60%{stroke-dashoffset:81.3} 65%{stroke-dashoffset:92.7} 70%{stroke-dashoffset:109.2}
                  75%{stroke-dashoffset:134.8} 80%{stroke-dashoffset:165.4} 85%{stroke-dashoffset:188.3}
                  90%{stroke-dashoffset:203.1} 95%{stroke-dashoffset:213.6} 100%{stroke-dashoffset:222}
                }
                @media (prefers-reduced-motion: reduce) { ellipse { animation: none !important; } }
              </style>
              <radialGradient id="sph4b"><stop offset="0.55" stop-color="#04050a"></stop><stop offset="0.92" stop-color="#0d1017"></stop><stop offset="1" stop-color="#232a35"></stop></radialGradient>
              <clipPath id="front4b"><rect x="-20" y="56" width="140" height="68" transform="rotate(-15 38 56)"></rect></clipPath>
              <clipPath id="top4b"><rect x="-20" y="-16" width="140" height="72" transform="rotate(-15 38 56)"></rect></clipPath>
              <filter id="glow4b" x="-30%" y="-30%" width="160%" height="160%">
                <feGaussianBlur stdDeviation="1.6" result="b"></feGaussianBlur>
                <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
              </filter>
            </defs>
            <circle cx="38" cy="56" r="24" fill="url(#sph4b)"></circle>
            <circle cx="38" cy="56" r="25.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.55" clip-path="url(#front4b)"></circle>
            <g transform="rotate(-15 50 52)" filter="url(#glow4b)">
              <ellipse cx="56" cy="52" rx="51" ry="14.4" transform="rotate(-7 56 54)" fill="none" stroke="#fb5a6f" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="222 0" style="animation: dashflow 7.37s linear infinite;"></ellipse><ellipse cx="56" cy="52" rx="51" ry="14.4" transform="rotate(-7 56 54)" fill="none" stroke="#ffb3bd" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="27 195" style="animation: keplerflow 7.37s linear infinite;"></ellipse><ellipse cx="56" cy="52" rx="51" ry="14.4" transform="rotate(-7 56 54)" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="77 145" opacity="0.4" style="stroke-dashoffset:-72.5;"></ellipse>
              <ellipse cx="56" cy="54" rx="51" ry="14.4" fill="none" stroke="#3ddc84" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="222 0" style="animation: dashflow 7.37s linear infinite; animation-delay:-2.457s;"></ellipse><ellipse cx="56" cy="54" rx="51" ry="14.4" fill="none" stroke="#a5f2c6" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="27 195" style="animation: keplerflow 7.37s linear infinite; animation-delay:-2.457s;"></ellipse><ellipse cx="56" cy="54" rx="51" ry="14.4" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="77 145" opacity="0.4" style="stroke-dashoffset:-72.5;"></ellipse>
              <ellipse cx="56" cy="56" rx="51" ry="14.4" transform="rotate(7 56 54)" fill="none" stroke="#48c6ef" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="222 0" style="animation: dashflow 7.37s linear infinite; animation-delay:-4.913s;"></ellipse><ellipse cx="56" cy="56" rx="51" ry="14.4" transform="rotate(7 56 54)" fill="none" stroke="#aee6fb" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="27 195" style="animation: keplerflow 7.37s linear infinite; animation-delay:-4.913s;"></ellipse><ellipse cx="56" cy="56" rx="51" ry="14.4" transform="rotate(7 56 54)" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="77 145" opacity="0.4" style="stroke-dashoffset:-72.5;"></ellipse>
            </g>
            <circle cx="38" cy="56" r="24" fill="url(#sph4b)" clip-path="url(#top4b)"></circle>
            <circle cx="38" cy="56" r="25.5" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.55" clip-path="url(#top4b)"></circle>
            
            <g><circle cx="38" cy="56" r="27.5" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.22"></circle><path d="M10.5 56 A27.5 27.5 0 0 1 65.5 56" transform="rotate(-15 38 56)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"></path></g>
          
</svg>